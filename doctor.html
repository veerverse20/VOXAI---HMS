<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Portal - Secure Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/doctor.css">
</head>
<body>
  <div class="login-container">
    <div class="login-left">
      <div>
        <h1 style="font-weight: 800; font-size: 38px; color: #1e3a8a; letter-spacing: 0;">VoxAI HMS</h1>
        <div style="display: flex; align-items: center; gap: 8px;">
          <h1 style="font-weight: 800; font-size: 38px; color: #1e3a8a; letter-spacing: 0; margin-top: -4px;">Doctor Portal</h1>
          <span style="font-size: 34px;">🩺</span>
        </div>
        <p style="margin-top: 16px; font-weight: 500; font-size: 14px;">Clinical workspace for schedule review, dictation, and chart updates.</p>
      </div>

      <div class="stethoscope-icon-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-stethoscope"><path d="M4.8 2.3A.3.3 0 1 0 5 2h-.2Z"/><path d="M8.5 2h1a1.5 1.5 0 0 1 1.5 1.5v3.57a3.43 3.43 0 0 0 6.86 0V3.5A1.5 1.5 0 0 1 19.36 2h1a.64.64 0 0 1 .64.64v8.72a9 9 0 0 1-18 0V2.64A.64.64 0 0 1 3.64 2h1A1.5 1.5 0 0 1 6.1 3.5v3.57a3.43 3.43 0 0 0 2.4 3.28"/></svg>
      </div>
    </div>

    <div class="login-right">
      <h2>Secure Login</h2>
      <div id="errorContainer" style="display: none;"></div>

      <form id="doctorLoginForm">
        <div class="form-group">
          <input type="email" id="email" placeholder="Registered Email" required>
        </div>
        <div class="form-group">
          <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn btn-doctor">Open Doctor Dashboard</button>
      </form>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="js/doctor-login.js"></script>
</body>
</html>
