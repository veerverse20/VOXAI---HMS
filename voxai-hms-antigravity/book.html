<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment - VoxAI HMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen w-full bg-[#f3f4f6] flex items-center justify-center p-6 select-none font-sans">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-slate-200 flex flex-col gap-6">
    
    <div class="text-center">
      <h1 class="text-2xl font-bold text-slate-800 font-sans tracking-tight">Book Your Appointment</h1>
      <p class="text-xs text-slate-500 mt-1.5 leading-relaxed font-semibold">
        Select your preferred doctor, date, and reason for consultation.
      </p>
    </div>

    <div id="successBanner" class="hidden bg-indigo-50 border border-indigo-250 text-indigo-700 rounded-lg p-3 text-xs font-semibold text-center animate-pulse"></div>
    <div id="errorBanner" class="hidden bg-red-50 border border-red-200 text-red-750 rounded-lg p-3 text-xs font-semibold text-center"></div>

    <form id="bookForm" class="flex flex-col gap-4 text-xs text-slate-800">
      
      <div class="flex flex-col gap-1.5">
        <label class="font-bold text-slate-550 uppercase text-[10px] tracking-wider">Select Specialty / Doctor</label>
        <select id="bookDoctorSelect" required class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-850 font-bold focus:bg-white outline-none focus:border-blue-500 cursor-pointer">
          <!-- Loaded dynamically -->
        </select>
      </div>

      <!-- Grid Date and Time -->
      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-1.5">
          <label class="font-bold text-slate-550 uppercase text-[10px] tracking-wider">Preferred Date</label>
          <input type="date" id="bookDate" required class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-850 font-bold focus:bg-white outline-none focus:border-blue-500 font-mono">
        </div>
        
        <div class="flex flex-col gap-1.5">
          <label class="font-bold text-slate-550 uppercase text-[10px] tracking-wider">Preferred Time</label>
          <select id="bookTimeSelect" required class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-850 font-bold focus:bg-white outline-none focus:border-blue-500 font-mono">
            <option value="9:30 AM">09:30 AM</option>
            <option value="11:30 AM">11:30 AM</option>
            <option value="2:00 PM">02:00 PM</option>
            <option value="3:30 PM">03:30 PM</option>
            <option value="5:00 PM">05:00 PM</option>
          </select>
        </div>
      </div>

      <!-- Reason -->
      <div class="flex flex-col gap-1.5">
        <label class="font-bold text-slate-550 uppercase text-[10px] tracking-wider">Reason for Visit (Briefly)</label>
        <textarea id="bookReason" placeholder="e.g., Check-up..." required class="bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs text-slate-850 font-semibold focus:bg-white outline-none focus:border-blue-500 h-24 resize-none"></textarea>
      </div>

      <!-- Assigned Profile select -->
      <div class="flex flex-col gap-1.5">
        <label class="font-bold text-slate-550 uppercase text-[10px] tracking-wider">Assigned Booking Patient Profile</label>
        <select id="bookPatientSelect" required class="bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs text-slate-800 font-bold focus:bg-white outline-none focus:border-blue-500">
          <!-- Loaded dynamically -->
        </select>
      </div>

      <!-- Confirm trigger -->
      <button type="submit" class="w-full mt-3 bg-[#2563eb] hover:bg-blue-700 text-white font-bold text-xs uppercase p-3 rounded-lg tracking-wider transition-colors cursor-pointer shadow-md">
        CONFIRM APPOINTMENT
      </button>

      <button type="button" id="cancelBtn" class="w-full text-slate-500 hover:text-slate-700 font-semibold text-[10px] uppercase text-center cursor-pointer transition-colors mt-1">
        Cancel and Return to Dashboard
      </button>

    </form>

  </div>

  <script type="module" src="script.js"></script>
  <script type="module">
    document.addEventListener("DOMContentLoaded", () => {
      // Require authenticated user (either patient or admin can schedule slots)
      const session = window.HMS_DB.getSession();
      if (!session) {
        window.location.href = "index.html";
        return;
      }

      // Populate doctor select
      const doctors = window.HMS_DB.getDoctors() || [];
      const attendance = window.HMS_DB.getAttendance() || [];
      const docSelect = document.getElementById("bookDoctorSelect");
      
      docSelect.innerHTML = "<option value=''>Choose a Doctor...</option>";
      doctors.forEach(d => {
        const att = attendance.find(a => a.doctor_id === d.doctor_id);
        const isAvail = att ? att.is_available : true;
        const opt = document.createElement("option");
        opt.value = d.doctor_id;
        opt.textContent = `Dr. ${d.name} (${d.specialty}) — ${isAvail ? 'Duty Present' : 'Absent!'}`;
        docSelect.appendChild(opt);
      });

      // Populate patients select
      const patients = window.HMS_DB.getPatients() || [];
      const patSelect = document.getElementById("bookPatientSelect");
      
      patSelect.innerHTML = "";
      patients.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.patient_id;
        opt.textContent = `${p.name} (${p.patient_id})`;
        patSelect.appendChild(opt);
      });

      // Default patient select matches session ID if patient
      if (session.role === "patient") {
        patSelect.value = session.id;
      }

      // Cancel routing
      document.getElementById("cancelBtn").addEventListener("click", () => {
        if (session.role === "admin") {
          window.location.href = "admin-dashboard.html";
        } else {
          window.location.href = "patient-dashboard.html";
        }
      });

      // Form submission
      const form = document.getElementById("bookForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        
        const docId = docSelect.value;
        const patId = patSelect.value;
        const date = document.getElementById("bookDate").value;
        const time_slot = document.getElementById("bookTimeSelect").value;
        const reason = document.getElementById("bookReason").value.trim();

        const successBanner = document.getElementById("successBanner");
        const errorBanner = document.getElementById("errorBanner");

        successBanner.classList.add("hidden");
        errorBanner.classList.add("hidden");

        const selectedDoc = doctors.find(d => d.doctor_id === docId);
        const selectedPat = patients.find(p => p.patient_id === patId);

        if (!selectedDoc) {
          errorBanner.textContent = "Please select a valid doctor.";
          errorBanner.classList.remove("hidden");
          return;
        }

        const appts = window.HMS_DB.getAppointments() || [];
        const nextId = appts.length > 0 ? Math.max(...appts.map(a => a.appointment_id)) + 1 : 1;

        const newAppt = {
          appointment_id: nextId,
          patient_id: patId,
          patient_name: selectedPat ? selectedPat.name : "Guest",
          doctor_id: docId,
          doctor_name: selectedDoc.name,
          doctor_specialty: selectedDoc.specialty,
          date,
          time_slot,
          reason,
          status: "CONFIRMED",
          created_at: new Date().toISOString()
        };

        appts.unshift(newAppt);
        window.HMS_DB.saveAppointments(appts);

        // Vocal alert
        if (window.speechSynthesis) {
          const speech = new SpeechSynthesisUtterance("Pre check-in completed. Slot is scheduled.");
          window.speechSynthesis.speak(speech);
        }

        successBanner.textContent = `Appointment scheduled successfully! Assigned slot: ${time_slot}`;
        successBanner.classList.remove("hidden");

        setTimeout(() => {
          if (session.role === "admin") {
            window.location.href = "admin-dashboard.html";
          } else {
            window.location.href = "patient-dashboard.html";
          }
        }, 1500);
      });
    });
  </script>
</body>
</html>
